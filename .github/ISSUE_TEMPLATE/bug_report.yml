name: Bug report
description: Report a defect in the ArcGIS Experience Builder widget.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the Experience Builder page, widget settings, map/data state, and user sign-in state if relevant.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Experience Builder 1.20, ArcGIS Enterprise/Online target, browser"
  - type: textarea
    id: notes
    attributes:
      label: Notes

