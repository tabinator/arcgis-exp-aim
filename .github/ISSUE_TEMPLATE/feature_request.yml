name: Feature request
description: Propose a widget improvement or workflow change.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should the user be able to accomplish?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include expected fields, map/data dependencies, AiM behavior, and validation rules.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true when this is done?

